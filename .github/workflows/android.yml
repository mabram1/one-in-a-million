name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # lets you run it by hand from the Actions tab

permissions:
  contents: write      # needed to publish the APK to a Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Lock portrait orientation
        run: |
          sed -i 's/android:name="\.MainActivity"/android:name=".MainActivity" android:screenOrientation="portrait"/' android/app/src/main/AndroidManifest.xml || true
          grep -n "screenOrientation" android/app/src/main/AndroidManifest.xml || echo "note: portrait patch not applied (manifest format differs) — non-fatal"

      - name: Copy web assets into the app
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Publish APK to the "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest debug build
          files: android/app/build/outputs/apk/debug/app-debug.apk
